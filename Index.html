<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Time Mark Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

video {
    width: 100%;
    border-radius: 12px;
}

.controls {
    text-align: center;
    margin-top: 10px;
}

input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-top: 5px;
    width: 90%;
}

.camera-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: white;
    border: 6px solid #ccc;
    margin: 20px auto;
    position: relative;
}

.camera-btn::after {
    content: '';
    width: 55px;
    height: 55px;
    background: #ff9500;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.preview-box {
    display: none;
    margin-top: 15px;
}

.preview-box img {
    width: 100%;
    border-radius: 12px;
}

.download-btn {
    background: #00c853;
    padding: 10px;
    margin-top: 10px;
    text-align: center;
    border-radius: 6px;
}

#location {
    font-size: 13px;
    margin-top: 10px;
    color: #ccc;
}
</style>
</head>

<body>

<div class="container">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="controls">
        <!-- ⏰ AUTO TIME -->
        <input type="time" id="customTime">

        <!-- 🏷️ PROJECT OPTIONAL -->
        <input type="text" id="customProject" placeholder="Nama project (opsional)">

        <!-- 📍 LOKASI -->
        <div id="location">Mengambil lokasi...</div>

        <div class="camera-btn" onclick="takePhoto()"></div>
    </div>

    <div class="preview-box" id="previewBox">
        <img id="previewImage">
        <div class="download-btn" onclick="downloadPhoto()">Download</div>
    </div>

</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let latitude = '-';
let longitude = '-';
let detailLocation = '';
let finalImage = '';

// ⏰ DEFAULT TIME SEKARANG
function setCurrentTime() {
    let now = new Date();
    let hours = String(now.getHours()).padStart(2, '0');
    let minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('customTime').value = `${hours}:${minutes}`;
}
setCurrentTime();

// CAMERA
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

// LOCATION
navigator.geolocation.getCurrentPosition(async pos => {
    latitude = pos.coords.latitude.toFixed(6);
    longitude = pos.coords.longitude.toFixed(6);

    try {
        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
        let data = await res.json();
        let a = data.address;

        let road = a.road || a.residential || '';
        let village = a.village || a.suburb || '';
        let district = a.city_district || a.county || '';
        let city = a.city || a.town || a.regency || '';
        let province = a.state || '';
        let postcode = a.postcode || '';

        let parts = [];
        if (road) parts.push(road);
        if (village) parts.push(village);
        if (district) parts.push("Kec. " + district);
        if (city) parts.push("Kab. " + city);
        if (province) parts.push(province);
        if (postcode) parts.push(postcode);

        detailLocation = parts.join(", ");

        document.getElementById('location').innerText = detailLocation;

    } catch {
        detailLocation = "Lokasi tidak tersedia";
    }
});

// 🔐 GENERATE UNIQUE CODE
function generateCode() {
    return 'ID-' + Date.now().toString(36).toUpperCase();
}

// 📸 TAKE PHOTO
function takePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let now = new Date();
    let timeString = document.getElementById('customTime').value;

    let dateString = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });

    let projectText = document.getElementById('customProject').value;

    ctx.fillStyle = "white";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 5;

    // 📍 LEFT-BOTTOM STACK
    let padding = 20;
    let lineHeight = 26;

    let x = padding;
    let y = canvas.height - padding;

    ctx.textAlign = "left";

    // KOORDINAT
    ctx.font = "15px Arial";
    ctx.fillText(`Koordinat: ${latitude}, ${longitude}`, x, y);
    y -= lineHeight;

    // LOKASI
    ctx.font = "15px Arial";
    ctx.fillText(detailLocation, x, y);
    y -= lineHeight;

    // TANGGAL
    ctx.font = "15px Arial";
    ctx.fillText(dateString, x, y);
    y -= lineHeight;

    // JAM
    ctx.font = "bold 50px Arial";
    ctx.fillText(timeString, x, y);
    y -= 60;

    // PROJECT (OPTIONAL)
    if (projectText) {
        ctx.font = "bold 26px Arial";
        ctx.fillText(projectText, x, y);
    }

    // 🔐 UNIQUE CODE (KANAN TENGAH VERTIKAL)
    let code = generateCode();

    ctx.save();
    ctx.translate(canvas.width - 15, canvas.height / 2);
    ctx.rotate(-Math.PI / 2);

    ctx.textAlign = "center";
    ctx.font = "10px Arial";
    ctx.fillText(code, 0, 0);

    ctx.restore();

    finalImage = canvas.toDataURL("image/png");

    document.getElementById('previewImage').src = finalImage;
    document.getElementById('previewBox').style.display = "block";
}

// DOWNLOAD
function downloadPhoto() {
    const link = document.createElement('a');
    link.download = `photo_${Date.now()}.png`;
    link.href = finalImage;
    link.click();

    document.getElementById('previewBox').style.display = "none";
}
</script>

</body>
</html>
